services:
  - type: web
    name: opencode-anthropic-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8080"
      - key: OPENCODE_PORT
        value: "4096"
      - key: WORKDIR
        value: /tmp/opencode-workspace
      - key: DB_PATH
        value: /var/data/agents.db
      # Set these in the Render dashboard (secret): route models through a
      # LiteLLM gateway. Without them, set ANTHROPIC_API_KEY instead.
      - key: LITELLM_BASE_URL
        sync: false
      - key: LITELLM_API_KEY
        sync: false
      - key: LITELLM_MODELS
        value: claude-sonnet-4-5
    disk:
      name: opencode-data
      mountPath: /var/data
      sizeGB: 1
